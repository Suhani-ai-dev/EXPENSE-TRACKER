<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💰 Expense Tracker Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrap">

<h1>💰 Expense Tracker Pro</h1>

<button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

<div class="card">

<input id="text" placeholder="📝 Description">
<input id="amount" type="number" placeholder="💰 Amount">

<select id="type">
  <option value="income">📈 Income</option>
  <option value="expense">📉 Expense</option>
</select>

<select id="cat">
  <option>🍔 Food</option>
  <option>🚗 Travel</option>
  <option>💡 Bills</option>
  <option>🛍️ Shopping</option>
  <option>💼 Salary</option>
  <option>📦 Other</option>
</select>

<input id="date" type="date">

<button onclick="addTx()">➕ Add / Update</button>
<button onclick="clearAll()">🧹 Clear All</button>

</div>

<div class="card summary">
  <div>💵 Balance<br>₹<span id="bal">0</span></div>
  <div>📈 Income<br>₹<span id="inc">0</span></div>
  <div>📉 Expense<br>₹<span id="exp">0</span></div>
  <div>📅 This Month<br>₹<span id="mon">0</span></div>
</div>

<div class="card">

<select id="filterCat" onchange="render()">
  <option value="">All Categories</option>
  <option>🍔 Food</option>
  <option>🚗 Travel</option>
  <option>💡 Bills</option>
  <option>🛍️ Shopping</option>
  <option>💼 Salary</option>
  <option>📦 Other</option>
</select>

<input id="search" placeholder="🔍 Search..." oninput="render()">

<button onclick="downloadCSV()">📤 Export CSV</button>

<table>
<thead>
<tr>
  <th>Date</th>
  <th>Description</th>
  <th>Category</th>
  <th>Type</th>
  <th>Amount</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
